        // --- Color Matching Utilities ---
        function hexToRgb(hex) {
            let shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
            hex = hex.replace(shorthandRegex, function(m, r, g, b) {
                return r + r + g + g + b + b;
            });
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
        }

        function rgbStringToRgb(rgbStr) {
            let match = rgbStr.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
            if (match) return { r: parseInt(match[1]), g: parseInt(match[2]), b: parseInt(match[3]) };
            return null;
        }

        function extractColor(str) {
            if (!str || str === 'none' || str === 'transparent') return null;
            if (str.startsWith('#')) return hexToRgb(str);
            if (str.startsWith('rgb')) return rgbStringToRgb(str);
            return null;
        }

        function colorDistance(c1, c2) {
            if (!c1 || !c2) return 1000;
            return Math.sqrt(Math.pow(c1.r - c2.r, 2) + Math.pow(c1.g - c2.g, 2) + Math.pow(c1.b - c2.b, 2));
        }

                "wwtp-s3-std1-desc": "Đạt và vượt quy chuẩn QCVN 40:2011/BTNMT (Cột A) của Việt Nam, duy trì độ ổn định 100% không có ngoại lệ.",
                "wwtp-s3-std3-title": "Tiêu chuẩn Công trình Xanh & Bền vững (LEED/LOTUS)",
                "wwtp-s3-std2-desc": "ISO 14001: Hệ thống quản lý môi trường. ISO 50001: Quản lý năng lượng (chứng minh Nhà máy xử lý nước thải tiêu thụ điện hiệu quả và giảm lượng khí thải carbon).",
                "wwtp-s3-std3-desc": "Bản thân nhà máy xử lý nước thải phải được thiết kế xanh, tối ưu hóa ánh sáng tự nhiên, tận dụng năng lượng mặt trời trên mái nhà và kiểm soát chặt chẽ tiếng ồn, mùi hôi (để không ảnh hưởng đến các nhà máy công nghệ cao xung quanh đòi hỏi độ sạch tuyệt đối của không khí).",
                "wwtp-s3-std4-title": "Tiêu chuẩn cụ thể của ngành công nghệ cao",
                "wwtp-s3-std5-title": "Minh bạch dữ liệu",
                "wwtp-s3-std4-desc": "Cam kết xử lý các thông số cực kỳ khó khăn mà luật pháp địa phương có thể chưa quy định rõ ràng nhưng các tiêu chuẩn quốc tế yêu cầu (ví dụ: giới hạn cực thấp đối với Tổng Nitơ, Flo và các hợp chất PFAS).",
                "wwtp-s3-std5-desc": "Khả năng chia sẻ dữ liệu giám sát nước thải theo thời gian thực trực tiếp tới màn hình hiển thị của các nhà đầu tư trong khu công nghiệp, giúp họ dễ dàng lập Báo cáo Phát triển bền vững hàng năm.",
                "wwtp-outro": "Sở hữu hệ thống như vậy, khu công nghiệp không đơn thuần là bán “đất” mà bán “hệ sinh thái an toàn, bền vững”, giúp nhà đầu tư loại bỏ hoàn toàn các rủi ro pháp lý và môi trường."
            }
        };
        I18n.init(LAYOUT_TRANSLATIONS);

        const App = () => {
            const [svgContent, setSvgContent] = useState(null);
            const [activeCategory, setActiveCategory] = useState(null);
            const [selectedLot, setSelectedLot] = useState(null);
            const [selectedRiver, setSelectedRiver] = useState(false);
            const [selectedWWTP, setSelectedWWTP] = useState(false);
            const [loading, setLoading] = useState(true);
            const [lang, setLang] = useState(I18n.getLang());
            const [error, setError] = useState(null);
            const [lotsData, setLotsData] = useState({});
            const [sidebarOpen, setSidebarOpen] = useState(false);

            // i18n helper
            const t = (key) => I18n.t(key);
            useEffect(() => I18n.onChange(setLang), []);

            // Pan and Zoom State
            const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
            const containerRef = useRef(null);
            const svgRef = useRef(null);
            const isDragging = useRef(false);
            const startPos = useRef({ x: 0, y: 0 });
            const clickStartPos = useRef({ x: 0, y: 0 }); // To differentiate click vs drag
            const lastTouchDistRef = useRef(null);

            // Auto-load SVG and lots data on mount
            useEffect(() => {
                // Fetch lots data from API
                fetch('/api/lots')
                    .then(res => res.json())
                    .then(data => {
                        const map = {};
                        data.forEach(lot => { map[lot.lotId] = lot; });
                        setLotsData(map);
                    })
                    .catch(err => console.error('Failed to load lots data:', err));

                // Fetch the SVG file
                fetch('/layout-vector.svg')
                    .then(res => {
                        if (!res.ok) throw new Error("Failed to load layout-vector.svg");
                        return res.text();
                    })
                    .then(text => {
                        text = text.replace(/font-size="([\d.]+)(px|pt|em|rem)?"/gi, (match, val, unit) => {
                            return `font-size="${parseFloat(val) * 1.3}${unit || ''}"`;
                        });
                        text = text.replace(/font-size:\s*([\d.]+)(px|pt|em|rem)?;?/gi, (match, val, unit) => {
                            return `font-size: ${parseFloat(val) * 1.3}${unit || ''};`;
                        });
                        setSvgContent(text);
                        setTransform({ x: 0, y: 0, scale: 1 });
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setError(err.message);
                        setLoading(false);
                    });
            }, []);

            // Process SVG Map & Attach Interactions
            useEffect(() => {
                if (!svgRef.current) return;
                
                const shapes = svgRef.current.querySelectorAll('path, polygon, rect, circle, ellipse, polyline');
                const attachedListeners = [];
                
                // --- Pre-calculate text positions from transform attributes ---
                const svgNode = svgRef.current.querySelector('svg');
                let svgBBox = { width: 10000, height: 10000 };
                try { svgBBox = svgNode.getBBox(); } catch(e) {}

                // Helper: parse translate(X Y) from transform attribute
                const parseTranslate = (el) => {
                    const tf = el.getAttribute('transform') || '';
                    const m = tf.match(/translate\(\s*([\d.]+)\s+([\d.]+)\s*\)/);
                    return m ? { x: parseFloat(m[1]), y: parseFloat(m[2]) } : null;
                };

                // Build general text position data (for WWTP/river detection)
                const textNodes = Array.from(svgNode.querySelectorAll('text'));
                const textData = textNodes.map(t => {
                    const pos = parseTranslate(t);
                    if (!pos) return null;
                    return {
                        text: t.textContent.trim(),
                        lowerText: t.textContent.trim().toLowerCase(),
                        cx: pos.x, cy: pos.y
                    };
                }).filter(Boolean);

                // Build lot code index: cls-7 = lot code, cls-6 = area
                const lotCodeTexts = Array.from(svgNode.querySelectorAll('text.cls-7')).map(t => {
                    const pos = parseTranslate(t);
                    if (!pos) return null;
                    return { code: t.textContent.trim(), x: pos.x, y: pos.y };
                }).filter(Boolean);
                // -----------------------------------------------------------------------

                shapes.forEach(shape => {
                    const bbox = shape.getBBox();
                    
                    // Skip shapes that are clearly massive background wrappers (e.g., > 95% of SVG area)
                    // CHANGED to && instead of || so extremely tall but narrow shapes (like the river) are not ignored
                    if (bbox.width > svgBBox.width * 0.95 && bbox.height > svgBBox.height * 0.95) return;

                    // Extract color
                    if (!shape.dataset.originalFill) {
                        let fill = shape.getAttribute('fill') || shape.style.fill;
                        if (!fill || fill === 'none' || fill === 'transparent') {
                            let parent = shape.parentElement;
                            while (parent && parent.tagName !== 'svg' && (!fill || fill === 'none' || fill === 'transparent')) {
                                fill = parent.getAttribute('fill') || parent.style.fill;
                                parent = parent.parentElement;
                            }
                        }
                        if (!fill || fill === 'none' || fill === 'transparent') {
                            fill = window.getComputedStyle(shape).fill;
                        }
                        shape.dataset.originalFill = fill;
                    }

                    const fill = shape.dataset.originalFill;
                    const shapeColor = extractColor(fill);

                    // Find texts that geographically overlap this shape (with padding for multi-line)
                    const padding = 25; 
                    const overlappingTexts = textData.filter(t => 
                        t.cx >= bbox.x - padding && t.cx <= bbox.x + bbox.width + padding && 
                        t.cy >= bbox.y - padding && t.cy <= bbox.y + bbox.height + padding
                    );

                    // Combine texts to safely catch words split across multiple <tspan> lines
                    const combinedText = overlappingTexts.map(t => t.lowerText).join(' ');

                    // --- Wastewater Treatment Plant (WWTP) Detection Logic ---
                    // Detect either by text overlap OR by the distinct dark green color of its lot
                    const isDarkGreen = shapeColor && shapeColor.g > 80 && shapeColor.r < 75 && shapeColor.b < 75;
                    const isWWTP = isDarkGreen || combinedText.includes('waste') || combinedText.includes('treatment') || combinedText.includes('wwtp');

                    if (isWWTP) {
                        shape.classList.add('lot-interactive');
                        
                        // Force a visual tint if transparent so hover glow works and it becomes clickable
                        if (!shapeColor || fill === 'none' || fill === 'transparent') {
                            shape.style.fill = 'rgba(20, 184, 166, 0.2)'; 
                        }

                        const clickHandler = (e) => {
                            const dx = Math.abs(e.clientX - clickStartPos.current.x);
                            const dy = Math.abs(e.clientY - clickStartPos.current.y);
                            if (dx > 5 || dy > 5) return; 
                            e.stopPropagation();
                            setSelectedWWTP(true);
                        };

                        shape.addEventListener('click', clickHandler);
                        attachedListeners.push({ shape, handler: clickHandler });
                        return; // Skip standard lot matching
                    }
                    // ---------------------------------------------------------

                    // --- River Detection Logic ---
                    // Detect light blue/cyan colors typical for water bodies OR overlapping text
                    const isBlue = shapeColor && shapeColor.b > 150 && shapeColor.g > 100 && shapeColor.r < 130;
                    const isRiver = isBlue || combinedText.includes('da river') || combinedText.includes('river');

                    if (isRiver) {
                        shape.classList.add('lot-interactive');
                        
                        // Force a visual tint if transparent so hover glow works and it becomes clickable
                        if (!shapeColor || fill === 'none' || fill === 'transparent') {
                            shape.style.fill = 'rgba(56, 189, 248, 0.2)'; 
                        }

                        const clickHandler = (e) => {
                            const dx = Math.abs(e.clientX - clickStartPos.current.x);
                            const dy = Math.abs(e.clientY - clickStartPos.current.y);
                            if (dx > 5 || dy > 5) return; 
                            e.stopPropagation();
                            setSelectedRiver(true);
                        };

                        shape.addEventListener('click', clickHandler);
                        attachedListeners.push({ shape, handler: clickHandler });
                        return; // Skip standard lot matching for the river
                    }
                    // -----------------------------

                    if (!shapeColor) return; // Skip standard matching if no valid color found

                    let matchedCategoryId = null;
                    let minDistance = COLOR_TOLERANCE; 

                    for (let cat of CATEGORIES) {
                        const dist = colorDistance(shapeColor, cat.rgb);
                        if (dist < minDistance) {
                            minDistance = dist;
                            matchedCategoryId = cat.id;
                        }
                    }

                    shape.classList.remove('lot-highlight-active', 'lot-dimmed');
                    shape.style.stroke = '';
                    shape.style.strokeWidth = '';
                    shape.style.filter = '';

                    // If valid lot category
                    if (matchedCategoryId) {
                        shape.classList.add('lot-interactive'); // Enable Hover

                        // Sidebar Selection Filtering
                        if (activeCategory) {
                            if (activeCategory === matchedCategoryId) {
                                shape.classList.add('lot-highlight-active');
                                shape.style.filter = `drop-shadow(0 0 12px ${fill}) brightness(1.25)`;
                            } else {
                                shape.classList.add('lot-dimmed');
                            }
                        }

                        // Attach Click Handler for Details Popup
                        const clickHandler = (e) => {
                            // Prevent triggering if user was just panning/dragging the map
                            const dx = Math.abs(e.clientX - clickStartPos.current.x);
                            const dy = Math.abs(e.clientY - clickStartPos.current.y);
                            if (dx > 5 || dy > 5) return; 
                            
                            e.stopPropagation();

                            // Find lot code text (cls-7) whose translate position is inside this shape's bbox
                            const pad = 15;
                            const shapeCx = bbox.x + bbox.width / 2;
                            const shapeCy = bbox.y + bbox.height / 2;
                            let lotCode = null;
                            let minDist = Infinity;
                            for (const lt of lotCodeTexts) {
                                // Text translate position must be inside (or near) shape bbox
                                if (lt.x >= bbox.x - pad && lt.x <= bbox.x + bbox.width + pad &&
                                    lt.y >= bbox.y - pad && lt.y <= bbox.y + bbox.height + pad) {
                                    const dist = Math.sqrt((lt.x - shapeCx) ** 2 + (lt.y - shapeCy) ** 2);
                                    if (dist < minDist) {
                                        minDist = dist;
                                        lotCode = lt.code;
                                    }
                                }
                            }
                            if (!lotCode) return; // No lot code found — not a valid lot

                            // Look up lot data from API
                            const lotInfo = lotsData[lotCode];

                            // Math & Pricing Logic (use API data if available)
                            const areaNum = lotInfo ? parseFloat(lotInfo.area) : 0;
                            const pricePerM2 = lotInfo ? lotInfo.price : 120;
                            const totalAreaM2 = areaNum * 10000;
                            const totalPrice = totalAreaM2 * pricePerM2;

                            // Clone shape for 360 Spin View
                            const clonedShape = shape.cloneNode(true);
                            clonedShape.classList.remove('lot-interactive', 'lot-highlight-active', 'lot-dimmed');
                            clonedShape.style.filter = '';

                            // Center shape inside a new square viewBox to prevent clipping during rotation
                            const diagonal = Math.sqrt(bbox.width ** 2 + bbox.height ** 2);
                            const offsetX = (diagonal - bbox.width) / 2 - bbox.x;
                            const offsetY = (diagonal - bbox.height) / 2 - bbox.y;
                            clonedShape.style.transform = `translate(${offsetX}px, ${offsetY}px)`;

                            const catObj = CATEGORIES.find(c => c.id === matchedCategoryId);

                            setSelectedLot({
                                code: lotCode,
                                area: lotInfo ? lotInfo.area : areaNum.toFixed(2),
                                category: catObj,
                                pricePerM2,
                                totalPrice,
                                shapeHTML: clonedShape.outerHTML,
                                viewBoxSize: diagonal,
                                status: lotInfo ? lotInfo.status : 'Available',
                                zoning: lotInfo ? lotInfo.zoning : (catObj ? catObj.name : ''),
                                coverage: lotInfo ? lotInfo.coverage : '60%',
                                useType: lotInfo ? lotInfo.use : 'Eco-Tech & Light Manufacturing',
                                height: lotInfo ? lotInfo.height : '25m (approx. 5 floors)',
                            });
                        };

                        shape.addEventListener('click', clickHandler);
                        attachedListeners.push({ shape, handler: clickHandler });
                    }
                });

                return () => {
                    attachedListeners.forEach(item => item.shape.removeEventListener('click', item.handler));
                };
            }, [activeCategory, svgContent, lotsData]);

            // --- Pan and Zoom Handlers ---
            const handleWheel = useCallback((e) => {
                e.preventDefault();
                const zoomSensitivity = 0.001;
                const delta = -e.deltaY * zoomSensitivity;
                
                setTransform(prev => {
                    let newScale = Math.min(Math.max(0.1, prev.scale + delta), 10);
                    const rect = containerRef.current.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;
                    const scaleRatio = newScale / prev.scale;
                    const newX = mouseX - (mouseX - prev.x) * scaleRatio;
                    const newY = mouseY - (mouseY - prev.y) * scaleRatio;
                    return { x: newX, y: newY, scale: newScale };
                });
            }, []);

            const handleMouseDown = useCallback((e) => {
                if (e.button !== 0) return; 
                isDragging.current = true;
                startPos.current = { x: e.clientX - transform.x, y: e.clientY - transform.y };
                clickStartPos.current = { x: e.clientX, y: e.clientY };
            }, [transform]);

            const handleMouseMove = useCallback((e) => {
                if (!isDragging.current) return;
                setTransform(prev => ({
                    ...prev,
                    x: e.clientX - startPos.current.x,
                    y: e.clientY - startPos.current.y
                }));
            }, []);

            const handleMouseUp = useCallback(() => {
                isDragging.current = false;
            }, []);

            useEffect(() => {
                const container = containerRef.current;
                if (container) {
                    container.addEventListener('wheel', handleWheel, { passive: false });
                    container.addEventListener('touchmove', handleTouchMove, { passive: false });
                }
                return () => {
                    if (container) {
                        container.removeEventListener('wheel', handleWheel);
                        container.removeEventListener('touchmove', handleTouchMove);
                    }
                };
            }, [handleWheel, handleTouchMove]);

            const handleZoomIn = () => setTransform(prev => ({ ...prev, scale: Math.min(prev.scale * 1.2, 10) }));
            const handleZoomOut = () => setTransform(prev => ({ ...prev, scale: Math.max(prev.scale / 1.2, 0.1) }));
            const handleResetZoom = () => setTransform({ x: 0, y: 0, scale: 1 });

            // --- Touch Handlers for Mobile ---
            const handleTouchStart = useCallback((e) => {
                if (e.touches.length === 1) {
                    isDragging.current = true;
                    const touch = e.touches[0];
                    startPos.current = { x: touch.clientX - transform.x, y: touch.clientY - transform.y };
                    clickStartPos.current = { x: touch.clientX, y: touch.clientY };
                } else if (e.touches.length === 2) {
                    isDragging.current = false;
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    lastTouchDistRef.current = Math.sqrt(dx * dx + dy * dy);
                }
            }, [transform]);

            const handleTouchMove = useCallback((e) => {
                e.preventDefault();
                if (e.touches.length === 1 && isDragging.current) {
                    const touch = e.touches[0];
                    setTransform(prev => ({
                        ...prev,
                        x: touch.clientX - startPos.current.x,
                        y: touch.clientY - startPos.current.y
                    }));
                } else if (e.touches.length === 2 && lastTouchDistRef.current) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const scaleFactor = dist / lastTouchDistRef.current;
                    lastTouchDistRef.current = dist;
                    setTransform(prev => {
                        const newScale = Math.min(Math.max(0.1, prev.scale * scaleFactor), 10);
                        const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        const rect = containerRef.current.getBoundingClientRect();
                        const mouseX = cx - rect.left;
                        const mouseY = cy - rect.top;
                        const scaleRatio = newScale / prev.scale;
                        const newX = mouseX - (mouseX - prev.x) * scaleRatio;
                        const newY = mouseY - (mouseY - prev.y) * scaleRatio;
                        return { x: newX, y: newY, scale: newScale };
                    });
                }
            }, []);

            const handleTouchEnd = useCallback(() => {
                isDragging.current = false;
                lastTouchDistRef.current = null;
            }, []);

            return (
                <div className="flex flex-col h-screen w-screen overflow-hidden font-sans">

                    {/* --- Header --- */}
                    <header className="h-14 border-b border-gray-800 bg-black flex items-center justify-between px-3 sm:px-6 z-20 shadow-sm shadow-emerald-900/10 shrink-0">
                        <div className="flex items-center gap-2 sm:gap-3 min-w-0">
                            <button onClick={() => window.location.href = '/'} className="p-1.5 sm:p-2 bg-emerald-500/10 rounded-lg border border-emerald-500/20 hover:bg-emerald-500/20 transition-colors shrink-0" title={t('hdr-back')}>
                                <i className="ph ph-arrow-left text-lg text-emerald-500"></i>
                            </button>
                            <div className="p-1.5 sm:p-2 bg-emerald-500/10 rounded-lg border border-emerald-500/20 hidden sm:flex">
                                <i className="ph ph-leaf text-lg text-emerald-500"></i>
                            </div>
                            <h1 className="font-semibold text-white tracking-wide text-sm sm:text-lg leading-tight truncate">{t('hdr-title')}</h1>
                        </div>
                        <div className="flex items-center gap-2 sm:gap-3 shrink-0">
                            <div className="hidden sm:flex items-center gap-2 text-sm font-medium text-slate-300">
                                <i className="ph ph-navigation-arrow text-emerald-500"></i>
                                <span>{t('hdr-status')}</span>
                            </div>
                            <div className="flex items-center gap-1.5 sm:pl-3 sm:border-l border-white/20">
                                <button onClick={() => I18n.setLanguage('en')} id="btn-en" className="w-6 h-6 rounded-full overflow-hidden border-2 border-transparent opacity-40 hover:opacity-100 transition-all hover:scale-110">
                                    <img src="https://flagcdn.com/w40/gb.png" alt="EN" className="w-full h-full object-cover" />
                                </button>
                                <button onClick={() => I18n.setLanguage('ja')} id="btn-ja" className="w-6 h-6 rounded-full overflow-hidden border-2 border-transparent opacity-40 hover:opacity-100 transition-all hover:scale-110">
                                    <img src="https://flagcdn.com/w40/jp.png" alt="JA" className="w-full h-full object-cover" />
                                </button>
                                <button onClick={() => I18n.setLanguage('vn')} id="btn-vn" className="w-6 h-6 rounded-full overflow-hidden border-2 border-transparent opacity-40 hover:opacity-100 transition-all hover:scale-110">
                                    <img src="https://flagcdn.com/w40/vn.png" alt="VN" className="w-full h-full object-cover" />
                                </button>
                            </div>
                            {/* Mobile sidebar toggle */}
                            <button
                                onClick={() => setSidebarOpen(!sidebarOpen)}
                                className="md:hidden p-1.5 bg-emerald-500/10 rounded-lg border border-emerald-500/20 hover:bg-emerald-500/20 transition-colors"
                            >
                                <i className={`ph ${sidebarOpen ? 'ph-x' : 'ph-list'} text-lg text-emerald-500`}></i>
                            </button>
                        </div>
                    </header>

                    {/* --- Main Content --- */}
                    <div className="flex flex-1 overflow-hidden">

                    {/* --- Map Area --- */}
                    <div
                        className="flex-1 relative bg-grid map-touch-none"
                        ref={containerRef}
                        onMouseDown={handleMouseDown}
                        onMouseMove={handleMouseMove}
                        onMouseUp={handleMouseUp}
                        onMouseLeave={handleMouseUp}
                        onTouchStart={handleTouchStart}
                        onTouchEnd={handleTouchEnd}
                    >
                        {loading && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-600 z-20 bg-white/50 backdrop-blur-sm">
                                <i className="ph ph-spinner-gap animate-spin text-4xl text-eco-500 mb-4"></i>
                                <p className="font-medium">{t('load-msg')}</p>
                            </div>
                        )}
                        
                        {error && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center text-red-500 z-20 bg-white/80 backdrop-blur-sm">
                                <i className="ph ph-warning-circle text-5xl mb-4"></i>
                                <p className="mb-4 font-medium">{error}</p>
                                <button onClick={() => setError(null)} className="px-5 py-2 bg-slate-100 border border-slate-300 rounded-lg hover:bg-slate-200 text-slate-800 font-medium">{t('dismiss')}</button>
                            </div>
                        )}

                        {!svgContent && !loading && !error && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center z-10">
                                <div className="bg-white/90 p-10 rounded-3xl border border-eco-500/30 shadow-2xl flex flex-col items-center text-center max-w-md backdrop-blur-md">
                                    <div className="w-20 h-20 bg-eco-500/10 text-eco-600 rounded-full flex items-center justify-center mb-6">
                                        <i className="ph ph-map-trifold text-4xl"></i>
                                    </div>
                                    <h2 className="text-2xl font-bold text-slate-800 mb-2">{t('load-title')}</h2>
                                    <p className="text-sm text-slate-500 mb-8 leading-relaxed">
                                        {t('load-desc')}
                                    </p>
                                </div>
                            </div>
                        )}

                        {!loading && !error && svgContent && (
                            <div 
                                ref={svgRef}
                                className={`svg-wrapper absolute inset-0 ${isDragging.current ? 'cursor-grabbing' : 'cursor-grab'}`}
                                style={{
                                    transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`,
                                    transformOrigin: '0 0',
                                    transition: isDragging.current ? 'none' : 'transform 0.1s ease-out'
                                }}
                                dangerouslySetInnerHTML={{ __html: svgContent }}
                            />
