<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Industrial Park Zoning Map</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        dark: '#0f172a',
                        panel: '#1e293b',
                        eco: {
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a; 
        }
        
        /* Interactive SVG Styles */
        .svg-wrapper svg {
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
        }

        .svg-wrapper path, 
        .svg-wrapper polygon, 
        .svg-wrapper rect {
            transition: opacity 0.3s ease, filter 0.3s ease, stroke 0.3s ease;
            vector-effect: non-scaling-stroke;
        }

        /* Highlight States */
        .lot-dimmed {
            opacity: 0.15 !important;
            filter: grayscale(100%) !important;
        }

        .lot-highlight-active {
            opacity: 1 !important;
            z-index: 10;
        }

        /* NEW: Hover Interaction states */
        .lot-interactive {
            cursor: pointer;
        }

        .lot-interactive:hover {
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.9)) brightness(1.25) !important;
        }
        
        /* Override SVG Text Styles */
        .svg-wrapper text, .svg-wrapper tspan {
            font-family: 'Inter', sans-serif !important;
            font-weight: 600 !important;
            pointer-events: none;
        }

        /* Blueprint Grid Pattern - White with Eco Green Lines */
        .bg-grid {
            background-color: #ffffff;
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(16, 185, 129, 0.12) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(16, 185, 129, 0.12) 1px, transparent 1px);
        }

        /* Animations */
        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.95); } 
            to { opacity: 1; transform: scale(1); } 
        }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }

        @keyframes spin360 { 100% { transform: rotate(360deg); } }
        .spin-slow {
            animation: spin360 15s linear infinite;
            transform-origin: center;
        }

        /* Scrollbar styling for dark sidebar */
        .sidebar-scroll::-webkit-scrollbar { width: 6px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: #1e293b; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Scrollbar styling for light popups (Eco Green) */
        .modal-scroll::-webkit-scrollbar { width: 10px; }
        .modal-scroll::-webkit-scrollbar-track { background: #f8fafc; border-radius: 8px; }
        .modal-scroll::-webkit-scrollbar-thumb { 
            background-color: #34d399; 
            border-radius: 8px; 
            border: 2px solid #f8fafc; 
            background-clip: padding-box;
        }
        .modal-scroll::-webkit-scrollbar-thumb:hover { background-color: #10b981; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- Color Matching Utilities ---
        function hexToRgb(hex) {
            let shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
            hex = hex.replace(shorthandRegex, function(m, r, g, b) {
                return r + r + g + g + b + b;
            });
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
        }

        function rgbStringToRgb(rgbStr) {
            let match = rgbStr.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
            if (match) return { r: parseInt(match[1]), g: parseInt(match[2]), b: parseInt(match[3]) };
            return null;
        }

        function extractColor(str) {
            if (!str || str === 'none' || str === 'transparent') return null;
            if (str.startsWith('#')) return hexToRgb(str);
            if (str.startsWith('rgb')) return rgbStringToRgb(str);
            return null;
        }

        function colorDistance(c1, c2) {
            if (!c1 || !c2) return 1000;
            return Math.sqrt(Math.pow(c1.r - c2.r, 2) + Math.pow(c1.g - c2.g, 2) + Math.pow(c1.b - c2.b, 2));
        }

        const CATEGORIES = [
            { id: 'A', name: 'Very Large Scale Enterprise', desc: '≥10 HA', color: '#1A00B3' },
            { id: 'B', name: 'Large Scale Enterprise', desc: '5-10 HA', color: '#3B008C' },
            { id: 'C', name: 'Medium Scale Enterprise', desc: '2-5 HA', color: '#6A00D6' },
            { id: 'D', name: 'Small Scale Enterprise', desc: '<2 HA', color: '#E60099' }
        ].map(c => ({ ...c, rgb: hexToRgb(c.color) }));

        const COLOR_TOLERANCE = 85; 

        const App = () => {
            const [svgContent, setSvgContent] = useState(null);
            const [activeCategory, setActiveCategory] = useState(null);
            const [selectedLot, setSelectedLot] = useState(null);
            const [selectedRiver, setSelectedRiver] = useState(false);
            const [selectedWWTP, setSelectedWWTP] = useState(false);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [lotsData, setLotsData] = useState({});

            // Pan and Zoom State
            const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
            const containerRef = useRef(null);
            const svgRef = useRef(null);
            const isDragging = useRef(false);
            const startPos = useRef({ x: 0, y: 0 });
            const clickStartPos = useRef({ x: 0, y: 0 }); // To differentiate click vs drag

            // Auto-load SVG and lots data on mount
            useEffect(() => {
                // Fetch lots data from API
                fetch('/api/lots')
                    .then(res => res.json())
                    .then(data => {
                        const map = {};
                        data.forEach(lot => { map[lot.lotId] = lot; });
                        setLotsData(map);
                    })
                    .catch(err => console.error('Failed to load lots data:', err));

                // Fetch the SVG file
                fetch('/layout-vector.svg')
                    .then(res => {
                        if (!res.ok) throw new Error("Failed to load layout-vector.svg");
                        return res.text();
                    })
                    .then(text => {
                        text = text.replace(/font-size="([\d.]+)(px|pt|em|rem)?"/gi, (match, val, unit) => {
                            return `font-size="${parseFloat(val) * 1.3}${unit || ''}"`;
                        });
                        text = text.replace(/font-size:\s*([\d.]+)(px|pt|em|rem)?;?/gi, (match, val, unit) => {
                            return `font-size: ${parseFloat(val) * 1.3}${unit || ''};`;
                        });
                        setSvgContent(text);
                        setTransform({ x: 0, y: 0, scale: 1 });
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setError(err.message);
                        setLoading(false);
                    });
            }, []);

            // Process SVG Map & Attach Interactions
            useEffect(() => {
                if (!svgRef.current) return;
                
                const shapes = svgRef.current.querySelectorAll('path, polygon, rect, circle, ellipse, polyline');
                const attachedListeners = [];
                
                // --- Pre-calculate text positions from transform attributes ---
                const svgNode = svgRef.current.querySelector('svg');
                let svgBBox = { width: 10000, height: 10000 };
                try { svgBBox = svgNode.getBBox(); } catch(e) {}

                // Helper: parse translate(X Y) from transform attribute
                const parseTranslate = (el) => {
                    const tf = el.getAttribute('transform') || '';
                    const m = tf.match(/translate\(\s*([\d.]+)\s+([\d.]+)\s*\)/);
                    return m ? { x: parseFloat(m[1]), y: parseFloat(m[2]) } : null;
                };

                // Build general text position data (for WWTP/river detection)
                const textNodes = Array.from(svgNode.querySelectorAll('text'));
                const textData = textNodes.map(t => {
                    const pos = parseTranslate(t);
                    if (!pos) return null;
                    return {
                        text: t.textContent.trim(),
                        lowerText: t.textContent.trim().toLowerCase(),
                        cx: pos.x, cy: pos.y
                    };
                }).filter(Boolean);

                // Build lot code index: cls-7 = lot code, cls-6 = area
                const lotCodeTexts = Array.from(svgNode.querySelectorAll('text.cls-7')).map(t => {
                    const pos = parseTranslate(t);
                    if (!pos) return null;
                    return { code: t.textContent.trim(), x: pos.x, y: pos.y };
                }).filter(Boolean);
                // -----------------------------------------------------------------------

                shapes.forEach(shape => {
                    const bbox = shape.getBBox();
                    
                    // Skip shapes that are clearly massive background wrappers (e.g., > 95% of SVG area)
                    // CHANGED to && instead of || so extremely tall but narrow shapes (like the river) are not ignored
                    if (bbox.width > svgBBox.width * 0.95 && bbox.height > svgBBox.height * 0.95) return;

                    // Extract color
                    if (!shape.dataset.originalFill) {
                        let fill = shape.getAttribute('fill') || shape.style.fill;
                        if (!fill || fill === 'none' || fill === 'transparent') {
                            let parent = shape.parentElement;
                            while (parent && parent.tagName !== 'svg' && (!fill || fill === 'none' || fill === 'transparent')) {
                                fill = parent.getAttribute('fill') || parent.style.fill;
                                parent = parent.parentElement;
                            }
                        }
                        if (!fill || fill === 'none' || fill === 'transparent') {
                            fill = window.getComputedStyle(shape).fill;
                        }
                        shape.dataset.originalFill = fill;
                    }

                    const fill = shape.dataset.originalFill;
                    const shapeColor = extractColor(fill);

                    // Find texts that geographically overlap this shape (with padding for multi-line)
                    const padding = 25; 
                    const overlappingTexts = textData.filter(t => 
                        t.cx >= bbox.x - padding && t.cx <= bbox.x + bbox.width + padding && 
                        t.cy >= bbox.y - padding && t.cy <= bbox.y + bbox.height + padding
                    );

                    // Combine texts to safely catch words split across multiple <tspan> lines
                    const combinedText = overlappingTexts.map(t => t.lowerText).join(' ');

                    // --- Wastewater Treatment Plant (WWTP) Detection Logic ---
                    // Detect either by text overlap OR by the distinct dark green color of its lot
                    const isDarkGreen = shapeColor && shapeColor.g > 80 && shapeColor.r < 75 && shapeColor.b < 75;
                    const isWWTP = isDarkGreen || combinedText.includes('waste') || combinedText.includes('treatment') || combinedText.includes('wwtp');

                    if (isWWTP) {
                        shape.classList.add('lot-interactive');
                        
                        // Force a visual tint if transparent so hover glow works and it becomes clickable
                        if (!shapeColor || fill === 'none' || fill === 'transparent') {
                            shape.style.fill = 'rgba(20, 184, 166, 0.2)'; 
                        }

                        const clickHandler = (e) => {
                            const dx = Math.abs(e.clientX - clickStartPos.current.x);
                            const dy = Math.abs(e.clientY - clickStartPos.current.y);
                            if (dx > 5 || dy > 5) return; 
                            e.stopPropagation();
                            setSelectedWWTP(true);
                        };

                        shape.addEventListener('click', clickHandler);
                        attachedListeners.push({ shape, handler: clickHandler });
                        return; // Skip standard lot matching
                    }
                    // ---------------------------------------------------------

                    // --- River Detection Logic ---
                    // Detect light blue/cyan colors typical for water bodies OR overlapping text
                    const isBlue = shapeColor && shapeColor.b > 150 && shapeColor.g > 100 && shapeColor.r < 130;
                    const isRiver = isBlue || combinedText.includes('da river') || combinedText.includes('river');

                    if (isRiver) {
                        shape.classList.add('lot-interactive');
                        
                        // Force a visual tint if transparent so hover glow works and it becomes clickable
                        if (!shapeColor || fill === 'none' || fill === 'transparent') {
                            shape.style.fill = 'rgba(56, 189, 248, 0.2)'; 
                        }

                        const clickHandler = (e) => {
                            const dx = Math.abs(e.clientX - clickStartPos.current.x);
                            const dy = Math.abs(e.clientY - clickStartPos.current.y);
                            if (dx > 5 || dy > 5) return; 
                            e.stopPropagation();
                            setSelectedRiver(true);
                        };

                        shape.addEventListener('click', clickHandler);
                        attachedListeners.push({ shape, handler: clickHandler });
                        return; // Skip standard lot matching for the river
                    }
                    // -----------------------------

                    if (!shapeColor) return; // Skip standard matching if no valid color found

                    let matchedCategoryId = null;
                    let minDistance = COLOR_TOLERANCE; 

                    for (let cat of CATEGORIES) {
                        const dist = colorDistance(shapeColor, cat.rgb);
                        if (dist < minDistance) {
                            minDistance = dist;
                            matchedCategoryId = cat.id;
                        }
                    }

                    shape.classList.remove('lot-highlight-active', 'lot-dimmed');
                    shape.style.stroke = '';
                    shape.style.strokeWidth = '';
                    shape.style.filter = '';

                    // If valid lot category
                    if (matchedCategoryId) {
                        shape.classList.add('lot-interactive'); // Enable Hover

                        // Sidebar Selection Filtering
                        if (activeCategory) {
                            if (activeCategory === matchedCategoryId) {
                                shape.classList.add('lot-highlight-active');
                                shape.style.filter = `drop-shadow(0 0 12px ${fill}) brightness(1.25)`;
                            } else {
                                shape.classList.add('lot-dimmed');
                            }
                        }

                        // Attach Click Handler for Details Popup
                        const clickHandler = (e) => {
                            // Prevent triggering if user was just panning/dragging the map
                            const dx = Math.abs(e.clientX - clickStartPos.current.x);
                            const dy = Math.abs(e.clientY - clickStartPos.current.y);
                            if (dx > 5 || dy > 5) return; 
                            
                            e.stopPropagation();

                            // Find lot code text (cls-7) whose translate position is inside this shape's bbox
                            const pad = 15;
                            const shapeCx = bbox.x + bbox.width / 2;
                            const shapeCy = bbox.y + bbox.height / 2;
                            let lotCode = null;
                            let minDist = Infinity;
                            for (const lt of lotCodeTexts) {
                                // Text translate position must be inside (or near) shape bbox
                                if (lt.x >= bbox.x - pad && lt.x <= bbox.x + bbox.width + pad &&
                                    lt.y >= bbox.y - pad && lt.y <= bbox.y + bbox.height + pad) {
                                    const dist = Math.sqrt((lt.x - shapeCx) ** 2 + (lt.y - shapeCy) ** 2);
                                    if (dist < minDist) {
                                        minDist = dist;
                                        lotCode = lt.code;
                                    }
                                }
                            }
                            if (!lotCode) return; // No lot code found — not a valid lot

                            // Look up lot data from API
                            const lotInfo = lotsData[lotCode];

                            // Math & Pricing Logic (use API data if available)
                            const areaNum = lotInfo ? parseFloat(lotInfo.area) : 0;
                            const pricePerM2 = lotInfo ? lotInfo.price : 120;
                            const totalAreaM2 = areaNum * 10000;
                            const totalPrice = totalAreaM2 * pricePerM2;

                            // Clone shape for 360 Spin View
                            const clonedShape = shape.cloneNode(true);
                            clonedShape.classList.remove('lot-interactive', 'lot-highlight-active', 'lot-dimmed');
                            clonedShape.style.filter = '';

                            // Center shape inside a new square viewBox to prevent clipping during rotation
                            const diagonal = Math.sqrt(bbox.width ** 2 + bbox.height ** 2);
                            const offsetX = (diagonal - bbox.width) / 2 - bbox.x;
                            const offsetY = (diagonal - bbox.height) / 2 - bbox.y;
                            clonedShape.style.transform = `translate(${offsetX}px, ${offsetY}px)`;

                            const catObj = CATEGORIES.find(c => c.id === matchedCategoryId);

                            setSelectedLot({
                                code: lotCode,
                                area: lotInfo ? lotInfo.area : areaNum.toFixed(2),
                                category: catObj,
                                pricePerM2,
                                totalPrice,
                                shapeHTML: clonedShape.outerHTML,
                                viewBoxSize: diagonal,
                                status: lotInfo ? lotInfo.status : 'Available',
                                zoning: lotInfo ? lotInfo.zoning : (catObj ? catObj.name : ''),
                                coverage: lotInfo ? lotInfo.coverage : '60%',
                                useType: lotInfo ? lotInfo.use : 'Eco-Tech & Light Manufacturing',
                                height: lotInfo ? lotInfo.height : '25m (approx. 5 floors)',
                            });
                        };

                        shape.addEventListener('click', clickHandler);
                        attachedListeners.push({ shape, handler: clickHandler });
                    }
                });

                return () => {
                    attachedListeners.forEach(item => item.shape.removeEventListener('click', item.handler));
                };
            }, [activeCategory, svgContent, lotsData]);

            // --- Pan and Zoom Handlers ---
            const handleWheel = useCallback((e) => {
                e.preventDefault();
                const zoomSensitivity = 0.001;
                const delta = -e.deltaY * zoomSensitivity;
                
                setTransform(prev => {
                    let newScale = Math.min(Math.max(0.1, prev.scale + delta), 10);
                    const rect = containerRef.current.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;
                    const scaleRatio = newScale / prev.scale;
                    const newX = mouseX - (mouseX - prev.x) * scaleRatio;
                    const newY = mouseY - (mouseY - prev.y) * scaleRatio;
                    return { x: newX, y: newY, scale: newScale };
                });
            }, []);

            const handleMouseDown = useCallback((e) => {
                if (e.button !== 0) return; 
                isDragging.current = true;
                startPos.current = { x: e.clientX - transform.x, y: e.clientY - transform.y };
                clickStartPos.current = { x: e.clientX, y: e.clientY };
            }, [transform]);

            const handleMouseMove = useCallback((e) => {
                if (!isDragging.current) return;
                setTransform(prev => ({
                    ...prev,
                    x: e.clientX - startPos.current.x,
                    y: e.clientY - startPos.current.y
                }));
            }, []);

            const handleMouseUp = useCallback(() => {
                isDragging.current = false;
            }, []);

            useEffect(() => {
                const container = containerRef.current;
                if (container) container.addEventListener('wheel', handleWheel, { passive: false });
                return () => { if (container) container.removeEventListener('wheel', handleWheel); };
            }, [handleWheel]);

            const handleZoomIn = () => setTransform(prev => ({ ...prev, scale: Math.min(prev.scale * 1.2, 10) }));
            const handleZoomOut = () => setTransform(prev => ({ ...prev, scale: Math.max(prev.scale / 1.2, 0.1) }));
            const handleResetZoom = () => setTransform({ x: 0, y: 0, scale: 1 });

            return (
                <div className="flex flex-col h-screen w-screen overflow-hidden font-sans">

                    {/* --- Header --- */}
                    <header className="h-14 border-b border-gray-800 bg-black flex items-center justify-between px-6 z-20 shadow-sm shadow-emerald-900/10 shrink-0">
                        <div className="flex items-center gap-3">
                            <button
                                onClick={() => window.location.href = '/'}
                                className="p-2 bg-emerald-500/10 rounded-lg border border-emerald-500/20 hover:bg-emerald-500/20 transition-colors"
                                title="Back to Home"
                            >
                                <i className="ph ph-arrow-left text-lg text-emerald-500"></i>
                            </button>
                            <div className="p-2 bg-emerald-500/10 rounded-lg border border-emerald-500/20">
                                <i className="ph ph-leaf text-lg text-emerald-500"></i>
                            </div>
                            <h1 className="font-semibold text-white tracking-wide text-lg leading-tight">Eco-Industrial Park</h1>
                        </div>
                        <div className="flex items-center gap-2 text-sm font-medium text-slate-300">
                            <i className="ph ph-navigation-arrow text-emerald-500"></i>
                            <span>Interactive Map Active</span>
                        </div>
                    </header>

                    {/* --- Main Content --- */}
                    <div className="flex flex-1 overflow-hidden">

                    {/* --- Map Area --- */}
                    <div 
                        className="flex-1 relative bg-grid"
                        ref={containerRef}
                        onMouseDown={handleMouseDown}
                        onMouseMove={handleMouseMove}
                        onMouseUp={handleMouseUp}
                        onMouseLeave={handleMouseUp}
                    >
                        {loading && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-600 z-20 bg-white/50 backdrop-blur-sm">
                                <i className="ph ph-spinner-gap animate-spin text-4xl text-eco-500 mb-4"></i>
                                <p className="font-medium">Loading Map Layout...</p>
                            </div>
                        )}
                        
                        {error && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center text-red-500 z-20 bg-white/80 backdrop-blur-sm">
                                <i className="ph ph-warning-circle text-5xl mb-4"></i>
                                <p className="mb-4 font-medium">{error}</p>
                                <button onClick={() => setError(null)} className="px-5 py-2 bg-slate-100 border border-slate-300 rounded-lg hover:bg-slate-200 text-slate-800 font-medium">Dismiss</button>
                            </div>
                        )}

                        {!svgContent && !loading && !error && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center z-10">
                                <div className="bg-white/90 p-10 rounded-3xl border border-eco-500/30 shadow-2xl flex flex-col items-center text-center max-w-md backdrop-blur-md">
                                    <div className="w-20 h-20 bg-eco-500/10 text-eco-600 rounded-full flex items-center justify-center mb-6">
                                        <i className="ph ph-map-trifold text-4xl"></i>
                                    </div>
                                    <h2 className="text-2xl font-bold text-slate-800 mb-2">Eco-Industrial Park</h2>
                                    <p className="text-sm text-slate-500 mb-8 leading-relaxed">
                                        Loading the master plan layout...
                                    </p>
                                </div>
                            </div>
                        )}

                        {!loading && !error && svgContent && (
                            <div 
                                ref={svgRef}
                                className={`svg-wrapper absolute inset-0 ${isDragging.current ? 'cursor-grabbing' : 'cursor-grab'}`}
                                style={{
                                    transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`,
                                    transformOrigin: '0 0',
                                    transition: isDragging.current ? 'none' : 'transform 0.1s ease-out'
                                }}
                                dangerouslySetInnerHTML={{ __html: svgContent }}
                            />
                        )}

                        {/* Floating Zoom Controls */}
                        <div className="absolute left-6 bottom-6 flex flex-col bg-white/90 backdrop-blur-md rounded-xl border border-slate-200 shadow-xl overflow-hidden text-slate-600 z-10">
                            <button onClick={handleZoomIn} className="p-3 hover:bg-slate-50 hover:text-eco-600 transition-colors" title="Zoom In">
                                <i className="ph ph-plus text-xl"></i>
                            </button>
                            <div className="h-px bg-slate-200 mx-2"></div>
                            <button onClick={handleResetZoom} className="p-3 hover:bg-slate-50 hover:text-eco-600 transition-colors" title="Reset View">
                                <i className="ph ph-corners-out text-xl"></i>
                            </button>
                            <div className="h-px bg-slate-200 mx-2"></div>
                            <button onClick={handleZoomOut} className="p-3 hover:bg-slate-50 hover:text-eco-600 transition-colors" title="Zoom Out">
                                <i className="ph ph-minus text-xl"></i>
                            </button>
                        </div>
                    </div>

                    {/* --- Sidebar Panel --- */}
                    <div className="w-[360px] bg-panel text-white border-l border-slate-700/50 flex flex-col z-10 shadow-2xl relative">
                        <div className="p-6 border-b border-slate-700/50">
                            <div className="flex items-center gap-4 mb-2">
                                <div className="p-2.5 bg-eco-500/20 text-eco-400 rounded-lg">

                                            <h3 className="text-2xl font-bold text-slate-800 tracking-tight">Wastewater Treatment Plant</h3>
                                            <p className="text-teal-600 font-medium text-sm flex items-center gap-1">
                                                A leading, state-of-the-art, specialized facility for a high-tech industrial park.
                                            </p>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedWWTP(false)} className="w-8 h-8 flex items-center justify-center rounded-full bg-teal-100 hover:bg-teal-200 text-teal-700 transition-colors">
                                        <i className="ph ph-x text-lg"></i>
                                    </button>
                                </div>

                                {/* Content Body */}
                                <div className="flex-1 p-8 overflow-y-auto text-slate-600 text-sm leading-relaxed space-y-8 modal-scroll">
                                    
                                    {/* SECTION 1 */}
                                    <section>
                                        <h4 className="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2">
                                            <i className="ph-fill ph-cpu text-teal-500"></i> 1. Structure and Components (Hardware & Core Technology)
                                        </h4>
                                        <p className="mb-4 text-slate-500 font-medium">Wastewater from high-tech industries (semiconductors, microchips, electronics, pharmaceuticals) is highly complex, containing heavy metals, persistent organic solvents, and specific chemicals. A modern plant includes:</p>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <h5 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><i className="ph-fill ph-git-merge text-teal-500"></i> Segregated Collection System</h5>
                                                <p className="text-xs text-slate-500">Wastewater is not mixed from the start. Independent pipelines collect individual streams separately: acidic/alkaline streams, heavy metal streams (Copper, Nickel, Fluorine), volatile organic compound (VOC) streams, ammonia streams, etc.</p>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <h5 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><i className="ph-fill ph-flask text-teal-500"></i> Advanced Treatment Station</h5>
                                                <ul className="text-xs text-slate-500 space-y-2 list-disc list-inside">
                                                    <li><strong className="text-slate-700">Multi-stage physico-chemical tanks:</strong> For high-efficiency precipitation and separation of heavy metals.</li>
                                                    <li><strong className="text-slate-700">Membrane Bioreactor (MBR):</strong> Combines microorganisms with microfiltration membranes to thoroughly separate suspended solids and organic matter, replacing traditional biological settling tanks.</li>
                                                </ul>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <h5 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><i className="ph-fill ph-sparkle text-teal-500"></i> Tertiary Treatment Module</h5>
                                                <ul className="text-xs text-slate-500 space-y-2 list-disc list-inside">
                                                    <li><strong className="text-slate-700">Advanced Oxidation Process (AOP):</strong> Uses Ozone combined with UV or H₂O₂ to "break down" extremely persistent chemicals (like PFAS - "forever chemicals").</li>
                                                    <li><strong className="text-slate-700">RO & EDI Systems:</strong> Reverse Osmosis & Electrodeionization reclaim wastewater into pure, clean water.</li>
                                                </ul>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <h5 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><i className="ph-fill ph-monitor-play text-teal-500"></i> "Smart Control Center"</h5>
                                                <p className="text-xs text-slate-500">Includes SCADA (Supervisory Control and Data Acquisition) and a network of thousands of IoT (Internet of Things) sensors for 24/7 online water quality monitoring.</p>
                                            </div>
                                        </div>
                                    </section>

                                    <div className="h-px bg-slate-200 w-full"></div>

                                    {/* SECTION 2 */}
                                    <section>
                                        <h4 className="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2">
                                            <i className="ph-fill ph-gear text-teal-500"></i> 2. Operational Methods (Process & Digital Management)
                                        </h4>
                                        <p className="mb-4 text-slate-500 font-medium">The operational process is not merely pumping water through tanks; it is a closed-loop system managed by data:</p>
                                        
                                        <div className="space-y-4">
                                            <div className="flex gap-4 items-start">
                                                <div className="w-8 h-8 rounded-full bg-teal-100 text-teal-600 font-bold flex items-center justify-center shrink-0 border border-teal-200">1</div>
                                                <div>
                                                    <h5 className="font-bold text-slate-800">Intelligent Reception and Equalization</h5>
                                                    <p className="text-slate-500 text-sm mt-1">AI analyzes data from input sensors to detect the concentration of incoming pollutants, thereby automatically adjusting the flow rate and chemical dosage into the tank to optimize costs and ensure the system is not "shocked" by the load.</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-4 items-start">
                                                <div className="w-8 h-8 rounded-full bg-teal-100 text-teal-600 font-bold flex items-center justify-center shrink-0 border border-teal-200">2</div>
                                                <div>
                                                    <h5 className="font-bold text-slate-800">Treatment via Segregated Modules</h5>
                                                    <p className="text-slate-500 text-sm mt-1">Wastewater streams are thoroughly treated for heavy metals, pH adjustment, and the removal of toxic organic substances through physico-chemical and biological clusters (MBR).</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-4 items-start">
                                                <div className="w-8 h-8 rounded-full bg-teal-500 text-white shadow-md font-bold flex items-center justify-center shrink-0">3</div>
                                                <div>
                                                    <h5 className="font-bold text-teal-700 flex items-center gap-2">Reuse and Towards Zero Liquid Discharge (ZLD) <i className="ph-fill ph-star"></i></h5>
                                                    <p className="text-slate-600 text-sm mt-1 font-medium bg-teal-50/50 p-3 rounded-lg border border-teal-100/50">This is the key point. Treated water is not discharged directly into the environment. It goes through the RO membrane filtration system to recover up to 70-90% of the freshwater, which is then supplied back to factories in the industrial park for cooling towers or sanitation. The remaining "brine" (highly concentrated salt water) is evaporated and crystallized into solid waste. Virtually not a single drop of liquid wastewater is discharged into the natural environment.</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-4 items-start">
                                                <div className="w-8 h-8 rounded-full bg-teal-100 text-teal-600 font-bold flex items-center justify-center shrink-0 border border-teal-200">4</div>
                                                <div>
                                                    <h5 className="font-bold text-slate-800">Circular Sludge Management</h5>
                                                    <p className="text-slate-500 text-sm mt-1">Sludge is pressed dry and dried to maximize volume reduction. Sludge containing precious metals (like copper and silver from the electronics industry) can be transferred to recycling partners for mineral recovery.</p>
                                                </div>
                                            </div>
                                        </div>
                                    </section>

                                    <div className="h-px bg-slate-200 w-full"></div>

                                    {/* SECTION 3 */}
                                    <section>
                                        <h4 className="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2">
                                            <i className="ph-fill ph-certificate text-teal-500"></i> 3. Standards Achieved to Attract US and Japanese Partners
                                        </h4>
                                        <p className="mb-5 text-slate-500 font-medium">Corporations like Intel, Samsung, Apple (and their suppliers) will send environmental audit teams to directly evaluate the industrial park before signing any contracts. Your industrial park must meet:</p>
                                        
                                        <ul className="space-y-3">
                                            <li className="flex gap-3">
                                                <div className="mt-0.5"><i className="ph-fill ph-check-circle text-teal-500 text-lg"></i></div>
                                                <div>
                                                    <strong className="text-slate-800 block mb-0.5">National Discharge Standards (Highest Level)</strong>
                                                    Meet and exceed Vietnam's QCVN 40:2011/BTNMT (Column A) regulation, maintaining 100% stability with no exceptions.
                                                </div>
                                            </li>
                                            <li className="flex gap-3">
                                                <div className="mt-0.5"><i className="ph-fill ph-check-circle text-teal-500 text-lg"></i></div>
                                                <div>
                                                    <strong className="text-slate-800 block mb-0.5">International Management System Standards</strong>
                                                    <span className="bg-slate-100 px-2 py-0.5 rounded text-xs font-bold text-slate-700 mr-2">ISO 14001:</span> Environmental management systems.<br/>
                                                    <span className="bg-slate-100 px-2 py-0.5 rounded text-xs font-bold text-slate-700 mr-2 mt-1 inline-block">ISO 50001:</span> Energy management (proving the WWTP consumes electricity efficiently and reduces carbon emissions).
                                                </div>
                                            </li>
                                            <li className="flex gap-3">
                                                <div className="mt-0.5"><i className="ph-fill ph-check-circle text-teal-500 text-lg"></i></div>
                                                <div>
                                                    <strong className="text-slate-800 block mb-0.5">Green Building & Sustainability Standards (LEED / LOTUS)</strong>
                                                    The WWTP itself must be designed green, optimizing natural light, utilizing rooftop solar power, and rigorously controlling noise and odors (so as not to affect surrounding high-tech factories that require absolute air purity).
                                                </div>
                                            </li>
                                            <li className="flex gap-3">
                                                <div className="mt-0.5"><i className="ph-fill ph-check-circle text-teal-500 text-lg"></i></div>
                                                <div>
                                                    <strong className="text-slate-800 block mb-0.5">High-tech Industry Specific Standards</strong>
                                                    Commitment to treating extremely difficult parameters that local laws may not yet clearly regulate but international standards require (e.g., extremely low limits for Total Nitrogen, Fluorine, and PFAS compounds).
                                                </div>
                                            </li>
                                            <li className="flex gap-3">
                                                <div className="mt-0.5"><i className="ph-fill ph-check-circle text-teal-500 text-lg"></i></div>
                                                <div>
                                                    <strong className="text-slate-800 block mb-0.5">Data Transparency</strong>
                                                    The ability to share real-time wastewater monitoring data directly to the display screens of investors in the industrial park, making it easy for them to compile their annual Sustainability Reports.
                                                </div>
                                            </li>
                                        </ul>
                                    </section>

                                    {/* OUTRO */}
                                    <div className="bg-teal-600 text-white p-5 rounded-xl shadow-md text-center">
                                        <p className="font-medium text-lg tracking-wide">
                                            By possessing such a system, the industrial park is not merely selling "land," but selling a <strong className="font-black text-teal-100">"safe and sustainable ecosystem,"</strong> helping investors completely eliminate legal and environmental risks.
                                        </p>
                                    </div>
                                </div>
                                
                                {/* Footer Action */}
                                <div className="bg-slate-50 p-4 border-t border-slate-100 flex justify-end shrink-0">
                                    <button onClick={() => setSelectedWWTP(false)} className="px-6 py-2.5 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-xl shadow-md shadow-teal-500/20 transition-all text-sm">
                                        Close Details
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
