    <script type="module">
import React, { useState, useEffect, useRef } from 'react';
import { createRoot } from 'react-dom/client';
import { Leaf, Map as MapIcon, Layers, Maximize, ZoomIn, ZoomOut, CheckCircle2, Navigation, AlertCircle, Upload, Zap, Sun, Wind, Droplets, Wifi, X, Building2, Tag, Ruler, ArrowRight, Check, ArrowLeft, Send } from 'lucide-react';

// Hardcoded known zones based on the provided visual layout.
const KNOWN_ZONES = [
  { label: 'Very Large Scale Enterprise (>10 ha)', color: '#3b00db', type: 'enterprise' },
  { label: 'Large Scale Enterprise (5-10 ha)', color: '#5a2b5b', type: 'enterprise' },
  { label: 'Medium Scale Enterprise (2-5 ha)', color: '#b400ff', type: 'enterprise' },
  { label: 'Small Scale Enterprise (<2 ha)', color: '#f000ff', type: 'enterprise' },
  { label: 'Da River', color: '#33ccff', type: 'water' },
  { label: 'Green Space & Buffer', color: '#8ec641', type: 'greenery' },
  { label: 'Open Area / Background', color: '#2a3e32', type: 'background' }
];

// Helper to convert #rrggbb to [r, g, b]
const hexToRgb = (hex) => {
  if (!hex || hex.length !== 7) return [0, 0, 0];
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b];
};

// Euclidean color distance
const colorDistance = (hex1, hex2) => {
  const [r1, g1, b1] = hexToRgb(hex1);
  const [r2, g2, b2] = hexToRgb(hex2);
  return Math.sqrt(Math.pow(r1 - r2, 2) + Math.pow(g1 - g2, 2) + Math.pow(b1 - b2, 2));
};

// Browser-native way to reliably normalize any color string
const normalizeColor = (colorStr) => {
  if (!colorStr || colorStr === 'none' || colorStr === 'transparent' || colorStr.replace(/\s/g, '').includes('rgba(0,0,0,0)')) {
    return null;
  }
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = colorStr;
  return ctx.fillStyle.toLowerCase();
};

function App() {
  const [rawSvg, setRawSvg] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [legend, setLegend] = useState([]);

  // Selection States
  const [activeColor, setActiveColor] = useState(null);
  const [selectedLot, setSelectedLot] = useState(null);
  const [panelView, setPanelView] = useState('details'); // 'details' | 'form' | 'success'

  // Pan and Zoom State
  const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
  const [isDragging, setIsDragging] = useState(false);
  const [startPos, setStartPos] = useState({ x: 0, y: 0 });
  const svgContainerRef = useRef(null);

  const handleFileUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    setLoading(true);
    const reader = new FileReader();
    reader.onload = (event) => {
      setRawSvg(event.target.result);
      setError(null);
      setLoading(false);
    };
    reader.onerror = () => {
      setError("Failed to read the uploaded file.");
      setLoading(false);
    };
    reader.readAsText(file);
  };

  useEffect(() => {
    // Fetch the uploaded SVG file
    //const svgUrl = window.location.origin !== 'null' ? `${window.location.origin}/layout-vector.svg` : '/layout-vector.svg';
    const svgUrl = 'layout-vector.svg';
    fetch(svgUrl)
      .then(res => {
        if (!res.ok) throw new Error("Failed to load layout-vector.svg. Ensure the file is available.");
        return res.text();
      })
      .then(text => {
        setRawSvg(text);
        setLoading(false);
      })
      .catch(err => {
        console.error(err);
        setError(err.message);
        setLoading(false);
      });
  }, []);

  useEffect(() => {
    if (rawSvg && svgContainerRef.current) {
      const svgEl = svgContainerRef.current.querySelector('svg');
      if (!svgEl) return;

      // Make SVG fully responsive
      svgEl.setAttribute('width', '100%');
      svgEl.setAttribute('height', '100%');
      svgEl.style.width = '100%';
      svgEl.style.height = '100%';

      const elements = svgEl.querySelectorAll('path, polygon, rect, circle, ellipse');
      const groups = {};

      elements.forEach((el, index) => {
        const computed = window.getComputedStyle(el);
        const fill = computed.fill;
        const hex = normalizeColor(fill);

        if (hex) {
          el.setAttribute('data-color-group', hex);
          // Add a unique ID for each selectable lot
          el.setAttribute('data-lot-id', `lot-${index}`);
          el.style.transition = 'opacity 0.4s ease, filter 0.4s ease, stroke 0.4s ease';

          if (!groups[hex]) groups[hex] = 0;
          groups[hex]++;
        }
      });

      const extractedColors = Object.keys(groups).filter(hex => {
        if (hex === '#000000' || hex === '#ffffff') return false;
        return true;
      });

      const legendItems = extractedColors.map(hex => {
        let bestMatch = null;
        let minDistance = Infinity;

        KNOWN_ZONES.forEach(zone => {
          const dist = colorDistance(hex, zone.color);
          if (dist < minDistance) {
            minDistance = dist;
            bestMatch = zone;
          }
        });

        return {
          hex,
          count: groups[hex],
          label: minDistance < 100 ? bestMatch.label : `Zoning Area (${hex.toUpperCase()})`,
          type: minDistance < 100 ? bestMatch.type : 'other'
        };
      }).sort((a, b) => b.count - a.count);

      setLegend(legendItems);
    }
  }, [rawSvg]);

  // Generate deterministic lot data based on element attributes
  const generateLotData = (target, hex) => {
    const lotId = target.getAttribute('data-lot-id');
    const index = parseInt(lotId.split('-')[1]);
    const zone = legend.find(l => l.hex === hex);

    // Only generate full popups for enterprise/industrial lots
    if (!zone || zone.type !== 'enterprise') return null;

    // Use element bounds to estimate relative area sizing
    const bbox = target.getBBox ? target.getBBox() : { x: 0, y: 0, width: 100, height: 100 };
    const rawArea = (bbox.width * bbox.height) / 1000;

    // Extract isolated shape for display
    const clone = target.cloneNode(true);
    clone.removeAttribute('data-selected');
    clone.removeAttribute('data-color-group');
    clone.removeAttribute('data-lot-id');
    clone.removeAttribute('class');
    clone.removeAttribute('style');
    clone.setAttribute('fill', 'rgba(16, 185, 129, 0.15)');
    clone.setAttribute('stroke', '#10b981');
    clone.setAttribute('stroke-width', '2');
    clone.setAttribute('vector-effect', 'non-scaling-stroke');

    // Add padding around the extracted shape
    const padX = bbox.width * 0.15;
    const padY = bbox.height * 0.15;
    const viewBox = `${bbox.x - padX} ${bbox.y - padY} ${bbox.width + padX * 2} ${bbox.height + padY * 2}`;

    // Scale area based on zone type constraints deterministically
    let areaHa = 0;
    if (zone.label.includes('>10')) areaHa = 10 + (index % 8) + (rawArea % 2);
    else if (zone.label.includes('5-10')) areaHa = 5 + (index % 5) + (rawArea % 1);
    else if (zone.label.includes('2-5')) areaHa = 2 + (index % 3) + (rawArea % 0.5);
    else areaHa = 0.5 + (rawArea % 1.5);

    const basePrice = 100 + (index % 25);
    const sectors = ['A', 'B', 'C', 'D', 'E'];
    const sector = sectors[index % sectors.length];
    const lotNum = (index % 15) + 1;

    // Randomize status based on ID
    const isAvailable = index % 4 !== 0;

    return {
      id: lotId,
      name: `Lot ${sector}${index % 3 + 1}-${lotNum}`,
      status: isAvailable ? 'Available' : 'Under Negotiation',
      zoning: zone.label.split(' (')[0],
      area: areaHa.toFixed(1),
      coverage: '60%',
      price: basePrice,
      rent: Math.round(areaHa * 10000 * basePrice).toLocaleString(),
      use: 'Eco-Tech & Light Manufacturing',
      height: '25m (approx. 5 floors)',
      shapeHtml: clone.outerHTML,
      viewBox: viewBox
    };
  };

  const handleSvgClick = (e) => {
    const target = e.target.closest('[data-color-group]');

    // Clear previously selected specific lot visuals
    document.querySelectorAll('[data-selected="true"]').forEach(el => el.removeAttribute('data-selected'));

    if (target) {
      const hex = target.getAttribute('data-color-group');
      const lotId = target.getAttribute('data-lot-id');

      if (lotId) {
        const lotData = generateLotData(target, hex);
        if (lotData) {
          target.setAttribute('data-selected', 'true');
          setSelectedLot(lotData);
          setPanelView('details');
          setActiveColor(null);
        } else {
          setSelectedLot(null);
          setPanelView('details');
          setActiveColor(prev => prev === hex ? null : hex);
        }
      }
    } else {
      setSelectedLot(null);
      setPanelView('details');
      setActiveColor(null);
    }
  };

  const handleLegendClick = (hex) => {
    document.querySelectorAll('[data-selected="true"]').forEach(el => el.removeAttribute('data-selected'));
    setSelectedLot(null);
    setPanelView('details');
    setActiveColor(prev => prev === hex ? null : hex);
  };

  // Pan and Zoom Handlers
  const handleWheel = (e) => {
    if (e.deltaY === 0) return;
    const scaleAmount = -e.deltaY * 0.002;
    setTransform(prev => {
      const newScale = Math.min(Math.max(0.5, prev.scale + scaleAmount), 10);
      return { ...prev, scale: newScale };
    });
  };

  const handlePointerDown = (e) => {
    if (e.button !== 0) return;
    setIsDragging(true);
    setStartPos({ x: e.clientX - transform.x, y: e.clientY - transform.y });
    e.target.setPointerCapture(e.pointerId);
  };

  const handlePointerMove = (e) => {
    if (!isDragging) return;
    setTransform(prev => ({
      ...prev,
      x: e.clientX - startPos.x,
      y: e.clientY - startPos.y
    }));
  };

  const handlePointerUp = (e) => {
    setIsDragging(false);
    e.target.releasePointerCapture(e.pointerId);
  };

  const resetView = () => {
    setTransform({ x: 0, y: 0, scale: 1 });
  };

  // Dynamic CSS
  const highlightCSS = `
    @keyframes slow-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-slow-spin {
      animation: slow-spin 20s linear infinite;
    }

    .svg-content [data-color-group] {
      transition: opacity 0.3s, filter 0.3s;
    }

    .svg-content [data-color-group]:hover {
      filter: brightness(1.15);
      cursor: pointer;
    }

    ${activeColor ? `
      .svg-content [data-color-group] {
        opacity: 0.15;
        filter: grayscale(80%) contrast(0.8);
      }
      .svg-content [data-color-group="${activeColor}"] {
        opacity: 1 !important;
        filter: grayscale(0%) contrast(1.1) brightness(1.2) drop-shadow(0px 0px 8px rgba(34, 197, 94, 0.4)) !important;
        stroke: #22c55e;
        stroke-width: 1.5px;
        vector-effect: non-scaling-stroke;
        z-index: 10;
      }
    ` : ''}

    .svg-content [data-selected="true"] {
      opacity: 1 !important;
      filter: brightness(1.4) drop-shadow(0px 0px 12px rgba(16, 185, 129, 0.6)) !important;
      stroke: #10b981 !important;
      stroke-width: 3px !important;
      vector-effect: non-scaling-stroke;
      z-index: 50;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.3);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 0.5);
    }
  `;

  return React.createElement('div', { className: "flex flex-col h-screen w-screen bg-white text-slate-900 overflow-hidden", style: { fontFamily: 'Inter, sans-serif' } },
    React.createElement('style', null, highlightCSS),

    // Header
    React.createElement('header', { className: "h-16 border-b border-gray-800 bg-black flex items-center justify-between px-6 z-20 shadow-sm shadow-emerald-900/10" },
      React.createElement('div', { className: "flex items-center gap-3" },
        React.createElement('div', { className: "p-2 bg-emerald-500/10 rounded-lg border border-emerald-500/20" },
          React.createElement(Leaf, { className: "w-5 h-5 text-emerald-500" })
        ),
        React.createElement('div', null,
          React.createElement('h1', { className: "font-semibold text-white tracking-wide text-lg leading-tight" }, "Eco-Industrial Park")
        )
      ),
      React.createElement('div', { className: "flex items-center gap-4 text-sm font-medium text-slate-300" },
        React.createElement('div', { className: "flex items-center gap-2" },
          React.createElement(Navigation, { className: "w-4 h-4 text-emerald-500" }),
          React.createElement('span', null, "Interactive Map Active")
        )
      )
    ),

    // Main
    React.createElement('main', { className: "flex-1 flex overflow-hidden relative" },

      // Sidebar Legend
      React.createElement('aside', { className: "w-80 md:w-96 bg-black border-r border-gray-200 flex flex-col z-10 shadow-xl overflow-hidden shrink-0" },
        React.createElement('div', { className: "p-6 border-b border-gray-800 flex items-center gap-3 bg-black" },
          React.createElement(Layers, { className: "w-5 h-5 text-emerald-400" }),
          React.createElement('h2', { className: "font-semibold text-white" }, "Zoning Legend")
        ),
        React.createElement('div', { className: "flex-1 overflow-y-auto p-4 custom-scrollbar" },
          React.createElement('div', { className: "space-y-2 mb-8" },
            loading ? (
              React.createElement('div', { className: "flex flex-col items-center justify-center h-full text-emerald-500/50 space-y-4 py-8" },
                React.createElement('div', { className: "animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-500" }),
                React.createElement('p', { className: "text-sm text-slate-400" }, "Analyzing layout...")
              )
            ) : error ? (
              React.createElement('div', { className: "p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl flex items-start gap-3 text-emerald-400" },
                React.createElement(AlertCircle, { className: "w-5 h-5 shrink-0" }),
                React.createElement('p', { className: "text-sm leading-relaxed" }, "Please upload the SVG file using the main window.")
              )
            ) : legend.length === 0 ? (
              React.createElement('div', { className: "p-4 text-center text-slate-400 text-sm" }, "No zoning data found in the map.")
            ) : (
              legend.map((item) =>
                React.createElement('button', {
                  key: item.hex,
                  onClick: () => handleLegendClick(item.hex),
                  className: `w-full text-left flex items-center gap-4 p-3 rounded-xl transition-all duration-300 border ${
                    activeColor === item.hex
                      ? 'bg-emerald-500/10 border-emerald-500/50 shadow-inner shadow-emerald-500/10'
                      : 'bg-gray-900 border-transparent hover:bg-gray-800 hover:border-emerald-500/20'
                  }`
                },
                  React.createElement('div', {
                    className: `w-6 h-6 rounded-md shadow-sm border border-black/20 shrink-0 flex items-center justify-center transition-transform ${activeColor === item.hex ? 'scale-110 ring-2 ring-emerald-500/50 ring-offset-2 ring-offset-black' : ''}`,
                    style: { backgroundColor: item.hex }
                  },
                    activeColor === item.hex && React.createElement(CheckCircle2, { className: "w-4 h-4 text-white drop-shadow-md" })
                  ),
                  React.createElement('div', { className: "flex-1 min-w-0" },
                    React.createElement('p', { className: `text-sm font-medium truncate transition-colors ${activeColor === item.hex ? 'text-emerald-400' : 'text-slate-200'}` }, item.label),
                    React.createElement('p', { className: "text-xs text-slate-400 mt-0.5" }, `${item.count} plots detected`)
                  )
                )
              )
            )
          ),

          // Dynamic Ecosystem Section
          React.createElement('div', { className: "pt-6 border-t border-gray-800" },
            React.createElement('div', { className: "flex items-center gap-2 mb-3" },
              React.createElement(Zap, { className: "w-4 h-4 text-emerald-500" }),
              React.createElement('h3', { className: "text-sm font-bold text-emerald-400 uppercase tracking-wider" }, "Dynamic Ecosystem")
            ),
            React.createElement('p', { className: "text-xs text-white leading-relaxed mb-6" },
              "A next-generation industrial hub focused on zero-emission logistics, renewable energy, and enterprise-grade utility management."
            ),
            React.createElement('div', { className: "space-y-5" },
              React.createElement('div', { className: "flex gap-3" },
                React.createElement(Sun, { className: "w-4 h-4 text-emerald-500 shrink-0 mt-0.5" }),
                React.createElement('div', null,
                  React.createElement('h4', { className: "text-sm font-semibold text-emerald-400" }, "Renewable Grid"),
                  React.createElement('p', { className: "text-xs text-white mt-1 leading-relaxed" }, "Integrated 50MW solar rooftop network with smart battery storage and 22kV substations.")
                )
              ),
              React.createElement('div', { className: "flex gap-3" },
                React.createElement(Wind, { className: "w-4 h-4 text-emerald-500 shrink-0 mt-0.5" }),
                React.createElement('div', null,
                  React.createElement('h4', { className: "text-sm font-semibold text-emerald-400" }, "Air Quality Control"),
                  React.createElement('p', { className: "text-xs text-white mt-1 leading-relaxed" }, "IoT sensors monitor PM2.5 and emissions in real-time across all manufacturing zones.")
                )
              ),
              React.createElement('div', { className: "flex gap-3" },
                React.createElement(Droplets, { className: "w-4 h-4 text-emerald-500 shrink-0 mt-0.5" }),
                React.createElement('div', null,
                  React.createElement('h4', { className: "text-sm font-semibold text-emerald-400" }, "Circular Water System"),
                  React.createElement('p', { className: "text-xs text-white mt-1 leading-relaxed" }, "Class A wastewater recovery, automated treatment, and rainwater harvesting networks.")
                )
              ),
              React.createElement('div', { className: "flex gap-3" },
                React.createElement(Wifi, { className: "w-4 h-4 text-emerald-500 shrink-0 mt-0.5" }),
                React.createElement('div', null,
                  React.createElement('h4', { className: "text-sm font-semibold text-emerald-400" }, "Smart Connectivity"),
                  React.createElement('p', { className: "text-xs text-white mt-1 leading-relaxed" }, "Dedicated 5G industrial slicing and Tier 3 data center fiber optic access.")
                )
              )
            )
          )
        )
      ),

      // Map Area
      React.createElement('section', { className: "flex-1 relative overflow-hidden bg-[#f8fafc]" },
        // Blueprint Grid Background
        React.createElement('div', {
          className: "absolute inset-0 pointer-events-none opacity-[0.06]",
          style: {
            backgroundImage: 'linear-gradient(#22c55e 1px, transparent 1px), linear-gradient(90deg, #22c55e 1px, transparent 1px)',
            backgroundSize: '40px 40px'
          }
        }),

        // Main Error/Upload Overlay
        (error || (!loading && !rawSvg)) && (
          React.createElement('div', { className: "absolute inset-0 flex flex-col items-center justify-center z-50 bg-white/90 backdrop-blur-md" },
            React.createElement('div', { className: "bg-white p-8 rounded-2xl border border-gray-200 shadow-2xl max-w-md w-full text-center flex flex-col items-center" },
              React.createElement('div', { className: "w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mb-6 ring-4 ring-emerald-50" },
                React.createElement(Upload, { className: "w-8 h-8 text-emerald-600" })
              ),
              React.createElement('h3', { className: "text-xl font-semibold text-slate-900 mb-2" }, "Upload Layout Map"),
              React.createElement('p', { className: "text-slate-500 text-sm mb-6 leading-relaxed" },
                error && error !== "Failed to read the uploaded file." ? "We couldn't auto-load the layout-vector.svg file. Please upload it manually to continue." : "Please upload your SVG layout file to begin mapping."
              ),
              React.createElement('label', { className: "cursor-pointer bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 px-6 rounded-xl transition-all w-full flex justify-center items-center gap-2 shadow-lg shadow-emerald-500/20 hover:shadow-emerald-500/40 hover:-translate-y-0.5" },
                React.createElement(Upload, { className: "w-5 h-5" }),
                React.createElement('span', null, "Select SVG File"),
                React.createElement('input', { type: "file", accept: ".svg", className: "hidden", onChange: handleFileUpload })
              )
            )
          )
        ),

        // Controls
        React.createElement('div', { className: "absolute top-6 right-6 z-20 flex flex-col gap-2" },
          React.createElement('button', { onClick: () => setTransform(p => ({ ...p, scale: p.scale * 1.2 })), className: "p-2.5 bg-white/90 backdrop-blur border border-gray-200 rounded-xl text-slate-700 hover:text-emerald-600 hover:border-emerald-500/30 transition-colors shadow-lg shadow-black/5", title: "Zoom In" },
            React.createElement(ZoomIn, { className: "w-5 h-5" })
          ),
          React.createElement('button', { onClick: () => setTransform(p => ({ ...p, scale: Math.max(0.2, p.scale / 1.2) })), className: "p-2.5 bg-white/90 backdrop-blur border border-gray-200 rounded-xl text-slate-700 hover:text-emerald-600 hover:border-emerald-500/30 transition-colors shadow-lg shadow-black/5", title: "Zoom Out" },
            React.createElement(ZoomOut, { className: "w-5 h-5" })
          ),
          React.createElement('button', { onClick: resetView, className: "p-2.5 bg-white/90 backdrop-blur border border-gray-200 rounded-xl text-slate-700 hover:text-emerald-600 hover:border-emerald-500/30 transition-colors shadow-lg shadow-black/5 mt-2", title: "Reset View" },
            React.createElement(Maximize, { className: "w-5 h-5" })
          )
        ),

        activeColor && !selectedLot && (
          React.createElement('div', { className: "absolute bottom-6 left-1/2 -translate-x-1/2 z-20" },
            React.createElement('button', {
              onClick: () => handleLegendClick(activeColor),
              className: "px-6 py-2.5 bg-emerald-600 text-white font-semibold rounded-full shadow-lg shadow-emerald-600/30 hover:bg-emerald-500 transition-colors flex items-center gap-2 text-sm"
            }, "Clear Zone Highlight")
          )
        ),

        // Lot Information Side Panel Overlay
        selectedLot && (
          React.createElement('div', { className: "absolute top-4 bottom-4 right-24 w-[28rem] bg-black border border-emerald-500/30 rounded-2xl shadow-2xl shadow-emerald-900/20 z-30 flex flex-col overflow-hidden" },
            // Header
            React.createElement('div', { className: "p-6 border-b border-emerald-500/20 bg-[#0a100d] relative flex-shrink-0 transition-all" },
              panelView === 'form' && (
